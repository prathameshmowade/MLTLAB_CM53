<!DOCTYPE html>
<html>
<head>
<title>AI Sentiment Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:450px;
height:600px;
background:#ffffff10;
backdrop-filter:blur(15px);
border-radius:15px;
padding:20px;
display:flex;
flex-direction:column;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.chat{
flex:1;
overflow-y:auto;
margin-bottom:15px;
}

.msg{
padding:10px;
margin:8px 0;
border-radius:10px;
max-width:80%;
}

.user{
background:#00c6ff;
color:black;
align-self:flex-end;
}

.ai{
background:#222;
}

input{
padding:10px;
border:none;
border-radius:8px;
width:100%;
font-size:16px;
}

.loader{
display:none;
margin:10px;
}

.dot{
height:8px;
width:8px;
background:white;
border-radius:50%;
display:inline-block;
animation:bounce 1.4s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

canvas{
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h3>🤖 AI Sentiment Chat</h3>

<div class="chat" id="chat"></div>

<div class="loader" id="loader">
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

<input type="text" id="textInput" placeholder="Type message and press Enter">

<canvas id="chart"></canvas>

</div>

<script src="main.js"></script>

</body>
</html>
