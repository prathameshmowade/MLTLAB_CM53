<!DOCTYPE html>
<html>
<head>
    <title>AI Pose + Gesture Control</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        h1 { margin-top: 20px; }

        .card {
            margin: auto;
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 25px rgba(0,255,255,0.3);
        }

        video, canvas {
            border-radius: 12px;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #00f2ff;
            cursor: pointer;
        }

        .pose {
            font-size: 24px;
            color: #ffcc00;
            margin-top: 10px;
        }

        .gesture {
            font-size: 18px;
            color: #00ffcc;
        }
    </style>
</head>

<body>

<h1>🤖 AI Pose + Gesture System</h1>

<div class="card">
    <button onclick="start()">Start</button><br><br>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="pose" id="poseText">Pose: -</div>
    <div class="gesture" id="gestureText">Gesture: -</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<script src="main.js"></script>

</body>
</html>
