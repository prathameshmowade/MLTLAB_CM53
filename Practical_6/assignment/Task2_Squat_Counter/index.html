<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Trainer</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

<style>
body {
    font-family: "Segoe UI", Arial;
    background: #eef2f7;
    text-align: center;
    margin: 0;
}

h2 {
    color: #1f3c88;
}

.container {
    position: relative;
    display: inline-block;
    margin-top: 20px;
}

video, canvas {
    transform: scaleX(-1); /* mirror effect */
    border-radius: 15px;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

.stats {
    margin-top: 15px;
    font-size: 20px;
    color: #2c3e50;
}

.counter {
    font-size: 32px;
    font-weight: bold;
    color: #e91e63;
}
</style>
</head>

<body>

<h2>🏋️ AI Trainer</h2>

<div class="stats">
    Squats: <span id="s-count" class="counter">0</span> |
    Hands: <span id="h-count" class="counter">0</span>
</div>

<div id="debug" style="color:#555;">Stand properly in front of camera</div>

<div class="container">
    <video id="video" width="640" height="480" autoplay muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
</div>

<script src="app.js"></script>

</body>
</html>
