<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pose Detection Dashboard</title>

<!-- TensorFlow + PoseNet -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #eef2f7;
    color: #2c3e50;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
    margin: 0;
}

/* Header Card */
.info {
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    width: 400px;
    text-align: center;
}

.info h2 {
    margin: 0;
    color: #1f3c88;
    letter-spacing: 1px;
}

#status {
    margin-top: 8px;
    font-size: 14px;
    color: #555;
}

/* Video Box */
.container {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

/* Mirror effect */
video, canvas {
    transform: scaleX(-1);
    border-radius: 15px;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<div class="info">
    <h2>AI Pose Detection</h2>
    <p id="status">Status: Loading AI...</p>
</div>

<div class="container">
    <video id="video" width="640" height="480" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Setup camera
async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480 }
    });

    video.srcObject = stream;

    return new Promise(resolve => {
        video.onloadedmetadata = () => resolve(video);
    });
}

// Draw keypoints
function drawPoints(keypoints) {
    keypoints.forEach(point => {
        if (point.score > 0.2) {
            ctx.beginPath();
            ctx.arc(point.position.x, point.position.y, 6, 0, 2 * Math.PI);
            ctx.fillStyle = "#007bff"; // blue
            ctx.fill();
        }
    });
}

// Draw skeleton
function drawSkeleton(keypoints) {
    const pairs = posenet.getAdjacentKeyPoints(keypoints, 0.2);

    pairs.forEach(pair => {
        ctx.beginPath();
        ctx.moveTo(pair[0].position.x, pair[0].position.y);
        ctx.lineTo(pair[1].position.x, pair[1].position.y);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#28a745"; // green
        ctx.stroke();
    });
}

// Main function
async function runPoseNet() {

    const net = await posenet.load({
        architecture: "MobileNetV1",
        outputStride: 16,
        inputResolution: { width: 640, height: 480 },
        multiplier: 0.75
    });

    document.getElementById("status").innerText = "Status: AI Active 🚀";

    await setupCamera();

    async function detect() {
        const pose = await net.estimateSinglePose(video, {
            flipHorizontal: false
        });

        console.log("Pose Score:", pose.score);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw video
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Draw skeleton + points
        drawSkeleton(pose.keypoints);
        drawPoints(pose.keypoints);

        requestAnimationFrame(detect);
    }

    detect();
}

runPoseNet();

</script>

</body>
</html>
